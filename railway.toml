# ============================================================
# railway.toml — Python Micro-Execution Engine
#
# This file configures the "micro-engine" Railway service.
# It is read by Railway for whichever service has its
# "Config File Path" set to "railway.toml" (the default).
#
# For the Rust bybit-ingester service, point its
# "Config File Path" (Railway dashboard → Settings → Build)
# to:  bybit_ingester/railway.toml
# ============================================================

[build]
builder        = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand            = "python main_micro_engine.py"
restartPolicyType       = "on_failure"
restartPolicyMaxRetries = 10
