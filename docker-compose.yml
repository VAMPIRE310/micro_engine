# ============================================================
# docker-compose.yml
# Local development — runs both services together
# ============================================================
#
#  Usage:
#    docker-compose up --build
#
#  The Rust ingester starts first and streams Bybit market data
#  to Redis AND exposes a fast-lane WebSocket on :8080.
#  The Python engine connects to both.
#
#  Environment variables can be overridden via a .env file
#  placed in the same directory as this file.
# ============================================================

version: "3.9"

services:

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Rust Bybit Ingester ──────────────────────────────────
  bybit-ingester:
    build:
      context: .
      dockerfile: Dockerfile.rust
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"          # Fast-lane WebSocket (Python connects here)
    environment:
      REDIS_URL: "redis://redis:6379"
      MAX_SYMBOLS: "${MAX_SYMBOLS:-0}"              # 0 = all symbols
      SYMBOL_OFFSET: "${SYMBOL_OFFSET:-0}"
      MESSAGE_BUFFER_SIZE: "${MESSAGE_BUFFER_SIZE:-10000}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ws/BTCUSDT || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Rust→Exodia Redis Bridge ────────────────────────────
  # Subscribes to the ephemeral pub/sub channels published by the Rust ingester
  # (klines:*, trades:*) and writes them into the persistent rolling lists that
  # the feature engine reads via LRANGE (market:kline_history:*, market:trade_history:*).
  redis-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      bybit-ingester:
        condition: service_started
    command: ["python", "-m", "core.rust_redis_bridge"]
    environment:
      REDIS_URL: "redis://redis:6379"
      BRIDGE_MAX_KLINE_HISTORY: "${BRIDGE_MAX_KLINE_HISTORY:-500}"
      BRIDGE_MAX_TRADE_HISTORY: "${BRIDGE_MAX_TRADE_HISTORY:-1000}"

  # ── Python Micro-Execution Engine ───────────────────────
  micro-engine:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      bybit-ingester:
        condition: service_started   # engine falls back gracefully if WS not ready
    environment:
      # ── Bybit credentials ──────────────────────────────
      BYBIT_API_KEY: "${BYBIT_API_KEY}"
      BYBIT_RSA_PRIVATE_KEY: "${BYBIT_RSA_PRIVATE_KEY}"        # full PEM content
      BYBIT_RSA_PRIVATE_KEY_PATH: "${BYBIT_RSA_PRIVATE_KEY_PATH:-}"  # alt: path to .pem
      BYBIT_DEMO: "${BYBIT_DEMO:-false}"

      # ── Engine config ──────────────────────────────────
      SYMBOL: "${SYMBOL:-BTCUSDT}"
      RUST_WS_URL: "ws://bybit-ingester:8080"   # primary market-data feed
      REDIS_URL: "redis://redis:6379"

      # ── PostgreSQL — persistent experience replay + model checkpoints ──
      # On Railway, use a Reference Variable so the services appear connected
      # in the canvas:  DATABASE_URL = ${{Postgres.DATABASE_URL}}
      # For local dev, set this in your .env file or leave empty to disable.
      DATABASE_URL: "${DATABASE_URL:-}"

      # ── Tuning ─────────────────────────────────────────
      HEDGE_TRIGGER_LOSS_USDT: "${HEDGE_TRIGGER_LOSS_USDT:--15.0}"
      PROFIT_BUFFER_USDT: "${PROFIT_BUFFER_USDT:-0.5}"
      POLL_INTERVAL_SEC: "${POLL_INTERVAL_SEC:-3}"

      # ── Railway / resource throttle ────────────────────
      # Cap PyTorch intra-op threads to avoid starving Numba + asyncio at startup.
      # On Railway Pro (32 vCPU) 4 threads gives full indicator throughput with
      # headroom for all other processes. Set to 0 to let PyTorch auto-detect.
      TORCH_NUM_THREADS: "${TORCH_NUM_THREADS:-4}"
      # Numba JIT thread count — mirrors PyTorch limit for consistent behaviour.
      NUMBA_NUM_THREADS: "${NUMBA_NUM_THREADS:-4}"
      # Seconds the management loop sleeps between ticks when no tick event fires.
      # Increase if Railway is showing high CPU usage between trades.
      MANAGEMENT_LOOP_SLEEP_SEC: "${MANAGEMENT_LOOP_SLEEP_SEC:-0.5}"
      # Grace period at startup (seconds) before the management loop and WS
      # connections start competing with the Numba JIT compile. Increase on
      # slow Railway start-up (e.g. cold-start with large model).
      STARTUP_GRACE_SEC: "${STARTUP_GRACE_SEC:-15.0}"
